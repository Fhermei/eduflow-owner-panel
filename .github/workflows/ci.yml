name: Owner Panel Backend CI — Lint & Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - dev

jobs:
  test:
    name: Run Django Checks & Tests
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-test-secret-key-owner-panel
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DB_NAME: owner_panel_ci_db.sqlite3
      OWNER_API_SECRET: ci-test-owner-secret
      SCHOOL_API_BASE_URL: "http://localhost:8000"
      CORS_ALLOW_ALL_ORIGINS: "True"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run migrations (SQLite)
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit security scan
        run: bandit -r . -x "./.venv,./tests" --severity-level medium || true
